name: Trigger Trading Bot

# on:
#   schedule:
#     - cron: '*/5 * * * *' # Run every 5 minutes (GitHub Actions minimum)
on:
  workflow_dispatch: # Allow manual trigger

jobs:
  wake-up-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Bot API
        run: |
          # Replace this URL with your actual Vercel project URL after deployment
          # Example: https://trading-bot-harshal.vercel.app/api/bot
          curl -I -X GET "https://crypto-bot-brown.vercel.app/api/bot" || echo "Bot Trigger Failed"
